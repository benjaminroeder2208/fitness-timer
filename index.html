<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Fitness Interval Timer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:#0a0a0f;font-family:'Courier New',monospace;overscroll-behavior:none;}
  input{font-size:16px!important;}
  button{touch-action:manipulation;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Audio ─────────────────────────────────────────────────────────────────────
function createBeep(ctx,freq,dur,vol=0.6){
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.frequency.value=freq;osc.type="sine";
  gain.gain.setValueAtTime(vol,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
}
function signalStart(ctx){createBeep(ctx,880,0.15,0.7);setTimeout(()=>createBeep(ctx,1100,0.25,0.7),160);}
function signalRest(ctx){createBeep(ctx,660,0.15,0.5);setTimeout(()=>createBeep(ctx,440,0.3,0.5),160);}
function signalCountdown(ctx){createBeep(ctx,700,0.1,0.4);}
function signalDone(ctx){[0,150,300,500].forEach((t,i)=>setTimeout(()=>createBeep(ctx,[880,1100,880,1320][i],0.2,0.7),t));}

// 25002500 Speech 250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang="de-DE";utt.rate=1.0;utt.pitch=1.0;utt.volume=1.0;
  setTimeout(()=>window.speechSynthesis.speak(utt),300);
}

// ── Defaults ──────────────────────────────────────────────────────────────────
const DEFAULT_CONFIG={
  rounds:1,
  exercises:[
    {name:"Burpees",      workSec:20,restSec:10,sets:8},
    {name:"Jumping Jacks",workSec:20,restSec:10,sets:8},
    {name:"Plank",        workSec:20,restSec:10,sets:8},
    {name:"Squats",       workSec:20,restSec:10,sets:8},
    {name:"Lunges",       workSec:20,restSec:10,sets:8},
  ],
  restBetweenRounds:60,
  countdownSec:20,
};

// Phase-Konstanten
// exSet = aktueller Durchlauf (1-basiert) der aktuellen Übung
const PHASES={IDLE:"idle",COUNTDOWN:"countdown",WORK:"work",REST:"rest",SET_REST:"set_rest",ROUND_REST:"round_rest",DONE:"done"};

function pad(n){return String(n).padStart(2,"0");}
function fmtTime(s){return `${pad(Math.floor(s/60))}:${pad(s%60)}`;}
function totalWorkoutSec(cfg){
  // Pro Runde: für jede Übung: sets × workSec + (sets-1) × restSec (Pause nach letztem Set entfällt)
  const perRound=cfg.exercises.reduce((sum,e)=>sum+e.sets*e.workSec+(e.sets-1)*e.restSec,0);
  return perRound*cfg.rounds+(cfg.rounds-1)*cfg.restBetweenRounds;
}

// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY="fitness-timer-workouts-v2";
function loadWorkouts(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch{return[];}}
function saveWorkoutsToStorage(list){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}}

// ── App ───────────────────────────────────────────────────────────────────────
function FitnessTimer(){
  const [tab,setTab]=useState("timer");
  const [config,setConfig]=useState(DEFAULT_CONFIG);
  const [editConfig,setEditConfig]=useState(DEFAULT_CONFIG);
  const [savedWorkouts,setSavedWorkouts]=useState(()=>loadWorkouts());
  const [showSaveDialog,setShowSaveDialog]=useState(false);
  const [saveName,setSaveName]=useState("");
  const [confirmDelete,setConfirmDelete]=useState(null);

  // Timer state
  const [phase,setPhase]=useState(PHASES.IDLE);
  const [round,setRound]=useState(1);       // aktueller Runden-Index (1-basiert)
  const [exIdx,setExIdx]=useState(0);       // aktueller Übungs-Index
  const [exSet,setExSet]=useState(1);       // aktueller Durchlauf der Übung (1-basiert)
  const [timeLeft,setTimeLeft]=useState(0);
  const [isPaused,setIsPaused]=useState(false);
  const [wakeLockStatus,setWakeLockStatus]=useState("idle");

  const audioCtxRef=useRef(null);
  const rafRef=useRef(null);
  const wakeLockRef=useRef(null);
  const stateRef=useRef({});
  const deadlineRef=useRef(null);
  const lastBeepSecRef=useRef(-1);

  useEffect(()=>{stateRef.current={phase,round,exIdx,exSet,timeLeft,isPaused,config};});
  useEffect(()=>{saveWorkoutsToStorage(savedWorkouts);},[savedWorkouts]);

  // ── Wake Lock ─────────────────────────────────────────────────────────────
  const acquireWakeLock=useCallback(async()=>{
    if(!("wakeLock" in navigator)){setWakeLockStatus("denied");return;}
    try{
      wakeLockRef.current=await navigator.wakeLock.request("screen");
      setWakeLockStatus("active");
      wakeLockRef.current.addEventListener("release",()=>setWakeLockStatus("idle"));
    }catch{setWakeLockStatus("denied");}
  },[]);
  const releaseWakeLock=useCallback(()=>{
    wakeLockRef.current?.release();wakeLockRef.current=null;setWakeLockStatus("idle");
  },[]);

  useEffect(()=>{
    const onVisible=async()=>{
      if(document.visibilityState==="visible"&&stateRef.current.phase!==PHASES.IDLE&&stateRef.current.phase!==PHASES.DONE){
        if(deadlineRef.current!==null&&!stateRef.current.isPaused){
          const drift=performance.now()-deadlineRef.current;
          if(drift>100){const sec=Math.floor(drift/1000);if(sec>0)advanceTimer(sec);deadlineRef.current=performance.now()+1000;}
        }
        await acquireWakeLock();
      }
    };
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[acquireWakeLock]);

  // ── Audio ─────────────────────────────────────────────────────────────────
  const getAudioCtx=useCallback(()=>{
    if(!audioCtxRef.current||audioCtxRef.current.state==="closed")
      audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtxRef.current.state==="suspended")audioCtxRef.current.resume();
    return audioCtxRef.current;
  },[]);

  // ── Transition logic ──────────────────────────────────────────────────────
  // State: { phase, round, exIdx, exSet, config }
  // Returns next state object or null if DONE
  const applyTransition=useCallback((s,ctx)=>{
    const cfg=s.config;
    const ex=cfg.exercises[s.exIdx];
    const totalEx=cfg.exercises.length;
    const isLastSet=s.exSet>=ex.sets;
    const isLastEx=s.exIdx===totalEx-1;
    const isLastRound=s.round===cfg.rounds;

    if(s.phase===PHASES.COUNTDOWN){
      if(ctx){signalStart(ctx);speak(cfg.exercises[s.exIdx].name);}
      return{phase:PHASES.WORK,timeLeft:cfg.exercises[s.exIdx].workSec,exIdx:s.exIdx,exSet:s.exSet,round:s.round};
    }

    if(s.phase===PHASES.WORK){
      if(!isLastSet){
        // Noch mehr Durchläufe dieser Übung → Set-Pause
        if(ctx)signalRest(ctx);
        return{phase:PHASES.REST,timeLeft:ex.restSec,exIdx:s.exIdx,exSet:s.exSet,round:s.round};
      }
      // Letzter Durchlauf dieser Übung
      if(isLastEx&&isLastRound){
        if(ctx){signalDone(ctx);setTimeout(()=>speak("Super, Training beendet!"),600);}
        return{phase:PHASES.DONE,timeLeft:0,exIdx:s.exIdx,exSet:s.exSet,round:s.round};
      }
      if(isLastEx){
        // Rundenende → Runden-Pause
        if(ctx)signalRest(ctx);
        return{phase:PHASES.ROUND_REST,timeLeft:cfg.restBetweenRounds,exIdx:s.exIdx,exSet:s.exSet,round:s.round};
      }
      // Nächste Übung → Pause, dann Ansage der nächsten Übung
      if(ctx){signalRest(ctx);setTimeout(()=>speak("Weiter mit "+cfg.exercises[s.exIdx+1].name),400);}
      return{phase:PHASES.SET_REST,timeLeft:ex.restSec,exIdx:s.exIdx,exSet:s.exSet,round:s.round};
    }

    if(s.phase===PHASES.REST){
      // Nach Set-Pause: nächster Durchlauf der gleichen Übung
      if(ctx)signalStart(ctx);
      return{phase:PHASES.WORK,timeLeft:ex.workSec,exIdx:s.exIdx,exSet:s.exSet+1,round:s.round};
    }

    if(s.phase===PHASES.SET_REST){
      // Nach Übungs-Pause: nächste Übung, Set 1
      if(ctx){signalStart(ctx);speak(cfg.exercises[s.exIdx+1].name);}
      return{phase:PHASES.WORK,timeLeft:cfg.exercises[s.exIdx+1].workSec,exIdx:s.exIdx+1,exSet:1,round:s.round};
    }

    if(s.phase===PHASES.ROUND_REST){
      // Nach Runden-Pause: neue Runde, erste Übung, Set 1
      if(ctx){signalStart(ctx);speak(cfg.exercises[0].name);}
      return{phase:PHASES.WORK,timeLeft:cfg.exercises[0].workSec,exIdx:0,exSet:1,round:s.round+1};
    }

    return null;
  },[]);

  // ── Advance N seconds (catch-up after hidden) ─────────────────────────────
  const advanceTimer=useCallback((seconds)=>{
    let s={...stateRef.current};
    for(let i=0;i<seconds;i++){
      if(s.phase===PHASES.DONE||s.phase===PHASES.IDLE)break;
      s={...s,timeLeft:s.timeLeft-1};
      if(s.timeLeft<=0){const n=applyTransition(s,null);if(!n)break;s={...s,...n};if(s.phase===PHASES.DONE)break;}
    }
    setPhase(s.phase);setRound(s.round);setExIdx(s.exIdx);setExSet(s.exSet);setTimeLeft(Math.max(0,s.timeLeft));
  },[applyTransition]);

  // ── RAF tick ──────────────────────────────────────────────────────────────
  const stopTimer=useCallback(()=>{
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    deadlineRef.current=null;
  },[]);

  const tick=useCallback(()=>{
    const now=performance.now(),s=stateRef.current;
    if(s.isPaused||s.phase===PHASES.IDLE||s.phase===PHASES.DONE){rafRef.current=requestAnimationFrame(tick);return;}
    if(deadlineRef.current===null){deadlineRef.current=now+1000;rafRef.current=requestAnimationFrame(tick);return;}
    if(now>=deadlineRef.current){
      const next=s.timeLeft-1;
      const bk=`${s.phase}-${next}`;
      if(next>0&&next<=3&&lastBeepSecRef.current!==bk){lastBeepSecRef.current=bk;signalCountdown(getAudioCtx());}
      if(next<=0){
        const result=applyTransition(s,getAudioCtx());
        if(result){
          lastBeepSecRef.current=-1;
          setPhase(result.phase);setRound(result.round);
          setExIdx(result.exIdx);setExSet(result.exSet);
          setTimeLeft(result.timeLeft);
          if(result.phase===PHASES.DONE){stopTimer();return;}
        }
      }else{setTimeLeft(next);}
      deadlineRef.current+=1000;
    }
    rafRef.current=requestAnimationFrame(tick);
  },[getAudioCtx,applyTransition,stopTimer]);

  const startTick=useCallback(()=>{
    stopTimer();deadlineRef.current=null;lastBeepSecRef.current=-1;
    rafRef.current=requestAnimationFrame(tick);
  },[stopTimer,tick]);

  // ── Controls ──────────────────────────────────────────────────────────────
  const handleStart=useCallback(async()=>{
    getAudioCtx();await acquireWakeLock();
    setRound(1);setExIdx(0);setExSet(1);setIsPaused(false);
    setPhase(PHASES.COUNTDOWN);setTimeLeft(config.countdownSec);startTick();
    // Ansage der ersten Übung während Countdown
    setTimeout(()=>speak(config.exercises[0].name),500);
  },[config,getAudioCtx,acquireWakeLock,startTick]);

  const handlePause=useCallback(()=>{
    setIsPaused(p=>{
      if(!p){deadlineRef.current=null;}
      else{deadlineRef.current=performance.now()+1000;}
      return!p;
    });
  },[]);

  const handleReset=useCallback(()=>{
    stopTimer();releaseWakeLock();
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    setPhase(PHASES.IDLE);setRound(1);setExIdx(0);setExSet(1);setTimeLeft(0);setIsPaused(false);
  },[stopTimer,releaseWakeLock]);

  useEffect(()=>()=>{stopTimer();releaseWakeLock();},[stopTimer,releaseWakeLock]);

  // ── Workout save/load ─────────────────────────────────────────────────────
  const handleSaveWorkout=()=>{
    if(!saveName.trim())return;
    const workout={
      id:Date.now(),name:saveName.trim(),
      createdAt:new Date().toLocaleDateString("de-DE"),
      config:{...editConfig,exercises:editConfig.exercises.map(e=>({...e}))},
    };
    setSavedWorkouts(prev=>[workout,...prev]);
    setSaveName("");setShowSaveDialog(false);
  };
  const handleLoadWorkout=(w)=>{setEditConfig({...w.config,exercises:w.config.exercises.map(e=>({...e}))});setTab("config");};
  const handleDeleteWorkout=(id)=>{setSavedWorkouts(prev=>prev.filter(w=>w.id!==id));setConfirmDelete(null);};
  const handleUseWorkout=(w)=>{setConfig({...w.config,exercises:w.config.exercises.map(e=>({...e}))});handleReset();setTab("timer");};

  // ── Config helpers ────────────────────────────────────────────────────────
  const addExercise=()=>setEditConfig(c=>({...c,exercises:[...c.exercises,{name:`Übung ${c.exercises.length+1}`,workSec:20,restSec:10,sets:8}]}));
  const removeExercise=i=>setEditConfig(c=>({...c,exercises:c.exercises.filter((_,idx)=>idx!==i)}));
  const updateExercise=(i,field,val)=>setEditConfig(c=>({...c,exercises:c.exercises.map((ex,idx)=>idx===i?{...ex,[field]:val}:ex)}));
  const applyConfig=()=>{setConfig({...editConfig,exercises:editConfig.exercises.map(e=>({...e}))});handleReset();setTab("timer");};

  // ── Derived display ───────────────────────────────────────────────────────
  const currentEx=config.exercises[exIdx]||config.exercises[0];
  const totalTime=
    phase===PHASES.WORK?currentEx.workSec:
    phase===PHASES.REST||phase===PHASES.SET_REST?currentEx.restSec:
    phase===PHASES.ROUND_REST?config.restBetweenRounds:
    phase===PHASES.COUNTDOWN?config.countdownSec:1;
  const progress=totalTime>0?((totalTime-timeLeft)/totalTime)*100:0;
  const isRunning=phase!==PHASES.IDLE&&phase!==PHASES.DONE;

  const phaseColor={
    [PHASES.IDLE]:"#4ade80",[PHASES.COUNTDOWN]:"#facc15",
    [PHASES.WORK]:"#f97316",[PHASES.REST]:"#38bdf8",
    [PHASES.SET_REST]:"#38bdf8",[PHASES.ROUND_REST]:"#a78bfa",
    [PHASES.DONE]:"#4ade80",
  }[phase]||"#4ade80";

  const phaseLabel={
    [PHASES.IDLE]:"Bereit",[PHASES.COUNTDOWN]:"Vorbereitung",
    [PHASES.WORK]:"ÜBUNG",[PHASES.REST]:"PAUSE",
    [PHASES.SET_REST]:"PAUSE",[PHASES.ROUND_REST]:"RUNDEN-PAUSE",
    [PHASES.DONE]:"FERTIG! 🎉",
  }[phase];

  const TABS=[
    {id:"timer",label:"▶ Timer"},
    {id:"config",label:"⚙ Setup"},
    {id:"workouts",label:`📂${savedWorkouts.length>0?` (${savedWorkouts.length})`:""}`},
  ];

  const btnStyle={width:44,height:44,borderRadius:10,border:"1px solid #2a2a3e",background:"#1a1a2e",color:"#f0f0f0",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,fontFamily:"inherit",flexShrink:0};

  function NumInput({value,onChange,min,max,unit}){
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>onChange(Math.max(min,value-(value>10?5:1)))} style={btnStyle}>−</button>
        <div style={{textAlign:"center",minWidth:52}}>
          <span style={{fontSize:22,fontWeight:700,lineHeight:1}}>{value}</span>
          {unit&&<span style={{fontSize:12,color:"#555",marginLeft:3}}>{unit}</span>}
        </div>
        <button onClick={()=>onChange(Math.min(max,value+(value>=10?5:1)))} style={btnStyle}>+</button>
      </div>
    );
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#f0f0f0",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:60,userSelect:"none"}}>

      {/* Header */}
      <div style={{width:"100%",maxWidth:480,padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,letterSpacing:4,color:"#555",textTransform:"uppercase"}}>Fitness</div>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:1}}>INTERVAL TIMER</div>
        </div>
        {isRunning&&<div style={{fontSize:20}}>{wakeLockStatus==="active"?"🔆":wakeLockStatus==="denied"?"⚠️":"💤"}</div>}
      </div>

      {/* Tabs */}
      <div style={{width:"100%",maxWidth:480,padding:"16px 20px 0",display:"flex",gap:8}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id==="config")setEditConfig({...config,exercises:config.exercises.map(e=>({...e}))});}}
            style={{flex:1,padding:"10px 4px",borderRadius:10,border:`1px solid ${tab===t.id?"transparent":"#1e1e2e"}`,cursor:"pointer",fontSize:11,letterSpacing:1,textTransform:"uppercase",background:tab===t.id?phaseColor:"#111118",color:tab===t.id?"#0a0a0f":"#666",fontFamily:"inherit",transition:"all 0.2s"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══ TIMER TAB ══ */}
      {tab==="timer"&&(
        <div style={{width:"100%",maxWidth:480,padding:"24px 20px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>

          {/* Circular timer */}
          <div style={{position:"relative",width:240,height:240,margin:"8px 0"}}>
            <svg width="240" height="240" style={{transform:"rotate(-90deg)"}}>
              <circle cx="120" cy="120" r="108" fill="none" stroke="#1a1a2e" strokeWidth="10"/>
              <circle cx="120" cy="120" r="108" fill="none" stroke={phaseColor} strokeWidth="10" strokeLinecap="round"
                strokeDasharray={`${2*Math.PI*108}`} strokeDashoffset={`${2*Math.PI*108*(1-progress/100)}`}
                style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.4s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:11,letterSpacing:3,color:phaseColor,marginBottom:4,textTransform:"uppercase"}}>{phaseLabel}</div>
              <div style={{fontSize:phase===PHASES.DONE?36:52,fontWeight:700,lineHeight:1,letterSpacing:-2,color:"#fff"}}>
                {phase===PHASES.DONE?"💪":fmtTime(Math.max(0,timeLeft))}
              </div>
              {isRunning&&phase===PHASES.WORK&&(
                <div style={{fontSize:13,color:"#aaa",marginTop:4,textAlign:"center",maxWidth:160}}>
                  {currentEx.name}
                  {currentEx.sets>1&&(
                    <span style={{color:phaseColor,marginLeft:6}}>{exSet}/{currentEx.sets}</span>
                  )}
                </div>
              )}
              {isRunning&&(phase===PHASES.REST)&&(
                <div style={{fontSize:12,color:"#aaa",marginTop:4}}>
                  Satz {exSet}/{currentEx.sets} · {currentEx.name}
                </div>
              )}
            </div>
          </div>

          {/* Runde / Übung / Satz */}
          <div style={{display:"flex",gap:20,justifyContent:"center"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#555",textTransform:"uppercase"}}>Runde</div>
              <div style={{fontSize:24,fontWeight:700}}>{round}<span style={{color:"#333",fontSize:14}}>/{config.rounds}</span></div>
            </div>
            <div style={{width:1,background:"#1e1e2e"}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#555",textTransform:"uppercase"}}>Übung</div>
              <div style={{fontSize:24,fontWeight:700}}>{exIdx+1}<span style={{color:"#333",fontSize:14}}>/{config.exercises.length}</span></div>
            </div>
            <div style={{width:1,background:"#1e1e2e"}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#555",textTransform:"uppercase"}}>Satz</div>
              <div style={{fontSize:24,fontWeight:700,color:phaseColor}}>{exSet}<span style={{color:"#333",fontSize:14}}>/{currentEx.sets}</span></div>
            </div>
          </div>

          {/* Exercise queue */}
          {(phase===PHASES.WORK||phase===PHASES.REST||phase===PHASES.SET_REST||phase===PHASES.IDLE)&&(
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
              {config.exercises.map((ex,i)=>{
                const isActive=i===exIdx&&isRunning;
                const isDone=i<exIdx||(i===exIdx&&phase===PHASES.DONE);
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:isActive?"#1a1a2e":"#111118",border:`1px solid ${isActive?phaseColor+"44":"#1e1e2e"}`,transition:"all 0.3s",opacity:isDone?0.3:1}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:isActive?phaseColor:isDone?"#222":"#2a2a3e",flexShrink:0}}/>
                    <div style={{flex:1,fontSize:14}}>{ex.name}</div>
                    <div style={{fontSize:11,color:"#f97316"}}>{ex.workSec}s</div>
                    <div style={{fontSize:11,color:"#555"}}>×{ex.sets}</div>
                    {/* Satz-Dots für aktive Übung */}
                    {isActive&&ex.sets>1&&(
                      <div style={{display:"flex",gap:4}}>
                        {Array.from({length:ex.sets}).map((_,si)=>(
                          <div key={si} style={{width:6,height:6,borderRadius:"50%",background:si<exSet-1?"#4ade80":si===exSet-1?phaseColor:"#2a2a3e",transition:"background 0.3s"}}/>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {wakeLockStatus==="denied"&&isRunning&&(
            <div style={{width:"100%",padding:"10px 14px",borderRadius:10,background:"#1a1208",border:"1px solid #f97316aa",fontSize:12,color:"#f97316",lineHeight:1.5}}>
              ⚠️ Wake Lock nicht verfügbar — Bildschirm kann ausgehen.
            </div>
          )}

          {/* Controls */}
          <div style={{display:"flex",gap:12,width:"100%"}}>
            {phase===PHASES.IDLE||phase===PHASES.DONE?(
              <button onClick={handleStart} style={{flex:1,padding:"18px",borderRadius:14,border:"none",background:phaseColor,color:"#0a0a0f",fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:2,textTransform:"uppercase",boxShadow:`0 0 32px ${phaseColor}55`}}>
                {phase===PHASES.DONE?"Nochmal":"▶ Start"}
              </button>
            ):(
              <>
                <button onClick={handlePause} style={{flex:1,padding:"18px",borderRadius:14,border:`1px solid ${phaseColor}55`,background:isPaused?phaseColor:"#1a1a2e",color:isPaused?"#0a0a0f":phaseColor,fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:2,textTransform:"uppercase"}}>
                  {isPaused?"▶ Weiter":"⏸ Pause"}
                </button>
                <button onClick={handleReset} style={{padding:"18px 20px",borderRadius:14,border:"1px solid #2a2a3e",background:"#111118",color:"#666",fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>↺</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* ══ CONFIG TAB ══ */}
      {tab==="config"&&(
        <div style={{width:"100%",maxWidth:480,padding:"24px 20px 0",display:"flex",flexDirection:"column",gap:20}}>
          <div>
            <div style={{fontSize:10,letterSpacing:4,color:"#555",textTransform:"uppercase",marginBottom:12}}>Allgemein</div>
            <div style={{background:"#111118",borderRadius:14,padding:"16px",border:"1px solid #1e1e2e"}}>
              {[
                ["Runden",editConfig.rounds,1,20,undefined,v=>setEditConfig(c=>({...c,rounds:v}))],
                ["Pause zwischen Runden",editConfig.restBetweenRounds,5,300,"s",v=>setEditConfig(c=>({...c,restBetweenRounds:v}))],
                ["Vorbereitung",editConfig.countdownSec,3,30,"s",v=>setEditConfig(c=>({...c,countdownSec:v}))],
              ].map(([label,val,min,max,unit,onChange],li)=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:li<2?"1px solid #1e1e2e":"none"}}>
                  <div style={{fontSize:13,color:"#888"}}>{label}</div>
                  <NumInput value={val} min={min} max={max} unit={unit} onChange={onChange}/>
                </div>
              ))}
            </div>
          </div>

          <div>
            <div style={{fontSize:10,letterSpacing:4,color:"#555",textTransform:"uppercase",marginBottom:12}}>Übungen</div>
            {editConfig.exercises.map((ex,i)=>(
              <div key={i} style={{background:"#111118",borderRadius:14,padding:"16px",border:"1px solid #1e1e2e",marginBottom:12}}>
                {/* Name + delete */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <input value={ex.name} onChange={e=>updateExercise(i,"name",e.target.value)}
                    style={{background:"transparent",border:"none",borderBottom:"1px solid #2a2a3e",color:"#f0f0f0",fontSize:16,fontFamily:"inherit",fontWeight:700,flex:1,outline:"none",padding:"4px 0",marginRight:12}}/>
                  {editConfig.exercises.length>1&&(
                    <button onClick={()=>removeExercise(i)} style={{background:"#1a0a0a",border:"1px solid #f9731644",borderRadius:8,color:"#f97316",cursor:"pointer",fontSize:14,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
                  )}
                </div>
                {/* Durchläufe */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:"#0d0d18",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:11,letterSpacing:2,color:"#4ade80",textTransform:"uppercase",width:80,flexShrink:0}}>Sätze</div>
                  <NumInput value={ex.sets} min={1} max={20} onChange={v=>updateExercise(i,"sets",v)}/>
                </div>
                {/* Arbeit */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:"#0d0d18",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:11,letterSpacing:2,color:"#f97316",textTransform:"uppercase",width:80,flexShrink:0}}>Dauer</div>
                  <NumInput value={ex.workSec} min={5} max={600} onChange={v=>updateExercise(i,"workSec",v)} unit="s"/>
                </div>
                {/* Pause */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d0d18",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:11,letterSpacing:2,color:"#38bdf8",textTransform:"uppercase",width:80,flexShrink:0}}>Pause</div>
                  <NumInput value={ex.restSec} min={0} max={300} onChange={v=>updateExercise(i,"restSec",v)} unit="s"/>
                </div>
                {/* Summary */}
                <div style={{marginTop:10,fontSize:11,color:"#444",textAlign:"right"}}>
                  {ex.sets}× {ex.workSec}s Dauer / {ex.restSec}s Pause
                  {" · "}
                  <span style={{color:"#555"}}>{Math.ceil((ex.sets*ex.workSec+(ex.sets-1)*ex.restSec)/60)} min</span>
                </div>
              </div>
            ))}
            <button onClick={addExercise} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px dashed #2a2a3e",background:"none",color:"#4ade80",fontSize:13,fontFamily:"inherit",cursor:"pointer",letterSpacing:2}}>
              + Übung hinzufügen
            </button>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowSaveDialog(true)} style={{flex:1,padding:"16px",borderRadius:14,border:"1px solid #2a2a3e",background:"#111118",color:"#a78bfa",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:1}}>
              💾 Speichern
            </button>
            <button onClick={applyConfig} style={{flex:2,padding:"16px",borderRadius:14,border:"none",background:"#4ade80",color:"#0a0a0f",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:2,textTransform:"uppercase",boxShadow:"0 0 24px #4ade8044"}}>
              ✓ Anwenden
            </button>
          </div>

          {/* Save dialog */}
          {showSaveDialog&&(
            <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:"0 0 40px 0"}}>
              <div style={{width:"100%",maxWidth:480,background:"#111118",borderRadius:"20px 20px 0 0",padding:"28px 24px",border:"1px solid #2a2a3e"}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Training speichern</div>
                <input autoFocus value={saveName} onChange={e=>setSaveName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleSaveWorkout()}
                  placeholder="Name des Trainings…"
                  style={{width:"100%",background:"#0d0d18",border:"1px solid #2a2a3e",borderRadius:10,color:"#f0f0f0",fontSize:16,fontFamily:"inherit",padding:"14px",outline:"none",boxSizing:"border-box",marginBottom:16}}/>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>{setShowSaveDialog(false);setSaveName("");}} style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #2a2a3e",background:"none",color:"#666",fontSize:14,fontFamily:"inherit",cursor:"pointer"}}>Abbrechen</button>
                  <button onClick={handleSaveWorkout} disabled={!saveName.trim()} style={{flex:2,padding:"14px",borderRadius:12,border:"none",background:saveName.trim()?"#a78bfa":"#2a2a3e",color:saveName.trim()?"#0a0a0f":"#555",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:saveName.trim()?"pointer":"default"}}>
                    💾 Speichern
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ══ WORKOUTS TAB ══ */}
      {tab==="workouts"&&(
        <div style={{width:"100%",maxWidth:480,padding:"24px 20px 0",display:"flex",flexDirection:"column",gap:12}}>
          {savedWorkouts.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#444"}}>
              <div style={{fontSize:40,marginBottom:16}}>📂</div>
              <div style={{fontSize:14,lineHeight:1.8}}>Noch keine Trainings gespeichert.<br/>Setup → 💾 Speichern</div>
            </div>
          ):savedWorkouts.map(w=>(
            <div key={w.id} style={{background:"#111118",borderRadius:14,padding:"16px",border:"1px solid #1e1e2e"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{w.name}</div>
                  <div style={{fontSize:11,color:"#555"}}>
                    {w.createdAt} · {w.config.exercises.length} Übungen · {w.config.rounds} Runden · ⏱ ca. {Math.ceil(totalWorkoutSec(w.config)/60)} min
                  </div>
                </div>
                <button onClick={()=>setConfirmDelete(w.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:18,padding:"0 0 0 8px"}}>✕</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {w.config.exercises.map((ex,i)=>(
                  <div key={i} style={{fontSize:11,padding:"4px 10px",borderRadius:20,background:"#1a1a2e",color:"#aaa",border:"1px solid #2a2a3e"}}>
                    {ex.name} <span style={{color:"#f97316"}}>{ex.workSec}s</span>
                    {(ex.sets||1)>1&&<span style={{color:"#4ade80"}}>×{ex.sets}</span>}
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>handleLoadWorkout(w)} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid #2a2a3e",background:"#1a1a2e",color:"#a78bfa",fontSize:12,fontFamily:"inherit",cursor:"pointer",fontWeight:700}}>✏️ Bearbeiten</button>
                <button onClick={()=>handleUseWorkout(w)} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"#f97316",color:"#0a0a0f",fontSize:12,fontFamily:"inherit",cursor:"pointer",fontWeight:700}}>▶ Direkt starten</button>
              </div>
              {confirmDelete===w.id&&(
                <div style={{marginTop:12,padding:"14px",background:"#1a0808",borderRadius:10,border:"1px solid #f9731644"}}>
                  <div style={{fontSize:13,marginBottom:12,color:"#f97316"}}>„{w.name}" wirklich löschen?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setConfirmDelete(null)} style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #2a2a3e",background:"none",color:"#888",fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>Nein</button>
                    <button onClick={()=>handleDeleteWorkout(w.id)} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:"#f97316",color:"#0a0a0f",fontSize:12,fontFamily:"inherit",cursor:"pointer",fontWeight:700}}>Ja, löschen</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FitnessTimer/>);
</script>
</body>
</html>
